<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>piano · 星语龟龟 · 柔和星座</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #010005;
            font-family: 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            color: #fff;
            background-image: 
                radial-gradient(circle at 15% 30%, rgba(25, 15, 55, 0.6) 0%, transparent 35%),
                radial-gradient(circle at 90% 70%, rgba(15, 25, 65, 0.7) 0%, transparent 45%),
                radial-gradient(circle at 40% 85%, rgba(40, 10, 60, 0.5) 0%, transparent 50%);
            background-blend-mode: overlay;
        }

        .gift-cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: radial-gradient(ellipse at center, #0b0720 0%, #010002 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
            overflow: hidden;
        }

        .gift-cover.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.2);
        }

        .gift-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: floatTitle 6s infinite alternate ease-in-out;
            text-align: center;
            padding: 0 20px;
        }

        .gift-title .main-text {
            font-size: 5rem;
            letter-spacing: 12px;
            background: linear-gradient(135deg, #ffffff, #f2dbff, #dab0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.9), 0 0 100px #c08eff, 0 0 150px #a05eff;
            margin-bottom: 15px;
            line-height: 1.2;
            white-space: nowrap;
        }

        .gift-title .sub-text {
            font-size: 2.4rem;
            letter-spacing: 10px;
            background: linear-gradient(135deg, #ffffff, #d4b5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 80px #a88eff;
            line-height: 1.3;
            white-space: nowrap;
        }

        @keyframes floatTitle {
            0% { transform: translateY(0px); opacity: 0.95; }
            100% { transform: translateY(-15px); opacity: 1; }
        }

        @media (max-width: 768px) {
            .gift-title .main-text {
                font-size: 3.2rem;
                letter-spacing: 8px;
                margin-bottom: 10px;
            }
            .gift-title .sub-text {
                font-size: 1.8rem;
                letter-spacing: 6px;
            }
        }

        @media (max-width: 480px) {
            .gift-title .main-text {
                font-size: 2.5rem;
                letter-spacing: 5px;
            }
            .gift-title .sub-text {
                font-size: 1.4rem;
                letter-spacing: 4px;
            }
        }

        .gift-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
            opacity: 0;
        }

        .gift-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #ffd0ff, 0 0 30px #ffd0ff;
            opacity: 0;
        }

        .nebula-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at 30% 50%, #121530, #000001 95%);
            overflow: hidden;
            animation: bgShift 80s infinite alternate ease-in-out;
            transition: opacity 1.5s ease;
        }

        @keyframes bgShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 15% 15%; }
        }

        .floating-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        .glow {
            position: absolute;
            width: 70vmax;
            height: 70vmax;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(70, 40, 160, 0.15) 0%, transparent 70%);
            animation: float 30s infinite alternate ease-in-out;
            filter: blur(70px);
        }

        .glow-1 {
            top: -20%;
            left: -20%;
            background: radial-gradient(circle, rgba(80, 40, 180, 0.2) 0%, transparent 70%);
            animation-duration: 35s;
        }

        .glow-2 {
            bottom: -30%;
            right: -15%;
            background: radial-gradient(circle, rgba(30, 80, 200, 0.2) 0%, transparent 70%);
            animation-duration: 40s;
        }

        .glow-3 {
            top: 40%;
            left: 60%;
            width: 100vmin;
            height: 100vmin;
            background: radial-gradient(circle, rgba(120, 50, 200, 0.15) 0%, transparent 70%);
            animation: pulse 20s infinite;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(8%, 10%) scale(1.5); opacity: 0.5; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.6); }
        }

        .orbital-objects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: visible;
            transition: opacity 1.5s ease;
        }

        @keyframes orbitRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes ringPulse {
            0% { opacity: 0.1; transform: scale(1); filter: blur(1px); }
            50% { opacity: 0.25; transform: scale(1.05); filter: blur(2px); }
            100% { opacity: 0.1; transform: scale(1); filter: blur(1px); }
        }

        .asteroid-belt {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 1px;
            height: 1px;
            animation: orbitRotate 200s linear infinite;
            transform-origin: center;
        }

        .asteroid {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transform-origin: center;
            box-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
        }

        .asteroid::after {
            content: '';
            position: absolute;
            top: -40%;
            left: -40%;
            width: 180%;
            height: 180%;
            border-radius: 50%;
            border: 1.5px dotted rgba(70, 140, 240, 0.4);
            box-shadow: 0 0 25px rgba(40, 100, 220, 0.4), inset 0 0 15px rgba(50, 110, 230, 0.2);
            pointer-events: none;
            animation: ringPulse 5s infinite alternate;
            transform: rotate(0deg);
        }

        .satellite {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 22px;
            height: 22px;
            background: radial-gradient(circle at 30% 30%, #9ab0e0, #5f7ab0);
            border-radius: 50%;
            box-shadow: 0 0 30px #6f8fdf, 0 0 60px #4f6fbf;
            transform-origin: center;
            opacity: 1;
        }

        .satellite-orbit {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 1px;
            height: 1px;
            animation: orbitRotate 40s linear infinite;
            transform-origin: center;
        }

        .satellite::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 10px;
            background: rgba(90, 140, 240, 0.25);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(20deg);
            box-shadow: 0 0 30px #6f8fdf;
            filter: blur(3px);
        }

        .ring {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 50vmin;
            height: 50vmin;
            border: 3px dotted rgba(70, 130, 220, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 70px rgba(50, 100, 200, 0.25), inset 0 0 60px rgba(50, 100, 200, 0.1);
            animation: ringPulse 12s infinite alternate;
        }

        .ring-small {
            width: 35vmin;
            height: 35vmin;
            border: 2px dotted rgba(90, 150, 240, 0.25);
            box-shadow: 0 0 60px rgba(70, 120, 220, 0.3), inset 0 0 50px rgba(70, 120, 220, 0.15);
            animation-duration: 16s;
        }

        .extra-ring {
            position: absolute;
            left: 50%;
            top: 50%;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border-style: dotted;
            pointer-events: none;
            animation: ringPulse infinite alternate;
        }

        .meteor-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            overflow: hidden;
            transition: opacity 1.5s ease;
        }

        .meteor {
            position: absolute;
            width: 180px;
            height: 2px;
            background: linear-gradient(90deg, rgba(130, 180, 255, 0.7) 0%, rgba(80, 130, 240, 0.2) 70%, transparent 100%);
            border-radius: 50%;
            filter: blur(2px);
            transform: rotate(35deg);
            opacity: 0;
            box-shadow: 0 0 30px #6f9eff, 0 0 60px #4f7ed0;
            animation: meteorFall linear infinite;
        }

        @keyframes meteorFall {
            0% {
                transform: translate(-20vw, -20vh) rotate(35deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            80% {
                opacity: 0.3;
            }
            100% {
                transform: translate(130vw, 130vh) rotate(35deg);
                opacity: 0;
            }
        }

        .piano-player {
            position: relative;
            z-index: 10;
            width: 850px;
            max-width: 92vw;
            margin: 12vh auto 5vh auto;
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-radius: 0;
            padding: 25px 25px 30px;
            transition: transform 0.3s ease, opacity 1s ease;
            opacity: 0;
            transform: translateY(50px);
        }

        .piano-player.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .piano-player:hover {
            transform: translateY(-5px);
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .piano-icon {
            font-size: 2.4rem;
            filter: drop-shadow(0 0 20px #a88eff);
            color: rgba(255, 255, 255, 0.8);
            animation: rotateIcon 15s infinite linear;
            text-shadow: 0 0 10px #fff, 0 0 20px #b6a2ff;
        }

        @keyframes rotateIcon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header h1 {
            font-weight: 300;
            font-size: 1.8rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffffff, #cfc2ff, #b8a0ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 2px solid rgba(255, 255, 255, 0.3);
            padding-left: 18px;
            text-shadow: 0 0 30px #cbb5ff, 0 0 60px #a48eff;
            animation: gradientShift 8s infinite alternate;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .wave-bar {
            display: flex;
            justify-content: center;
            gap: 6px;
            height: 70px;
            margin: 0 0 20px;
            position: relative;
        }

        .wave-bar::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 8px;
            background: rgba(120, 90, 220, 0.2);
            border-radius: 50%;
            filter: blur(8px);
        }

        .wave-bar span {
            width: 5px;
            height: 20px;
            background: linear-gradient(to top, #9f87f0, #cbb5ff, #f0e0ff);
            background-size: 200% 200%;
            border-radius: 20px;
            animation: waveGlow 2.4s infinite ease-in-out, gradientFlow 4s infinite alternate;
            box-shadow: 0 0 15px #b09eff;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 100%; }
            100% { background-position: 0% 0%; }
        }

        .wave-bar span:nth-child(2) { animation-delay: 0.2s; height: 36px; }
        .wave-bar span:nth-child(3) { animation-delay: 0.4s; height: 52px; }
        .wave-bar span:nth-child(4) { animation-delay: 0.6s; height: 62px; }
        .wave-bar span:nth-child(5) { animation-delay: 0.8s; height: 54px; }
        .wave-bar span:nth-child(6) { animation-delay: 1.0s; height: 42px; }
        .wave-bar span:nth-child(7) { animation-delay: 1.2s; height: 30px; }
        .wave-bar span:nth-child(8) { animation-delay: 1.4s; height: 39px; }
        .wave-bar span:nth-child(9) { animation-delay: 1.6s; height: 50px; }
        .wave-bar span:nth-child(10) { animation-delay: 1.8s; height: 34px; }
        .wave-bar span:nth-child(11) { animation-delay: 2.0s; height: 25px; }
        .wave-bar span:nth-child(12) { animation-delay: 0.3s; height: 46px; }

        @keyframes waveGlow {
            0%, 100% { transform: scaleY(0.7); opacity: 0.7; filter: hue-rotate(0deg); }
            50% { transform: scaleY(1.4); opacity: 1; filter: hue-rotate(8deg) brightness(1.3); }
        }

        .piano-container {
            position: relative;
            height: 200px;
            display: flex;
            justify-content: center;
            margin: 15px 0 25px;
            padding: 12px 0;
            background: transparent;
            border-radius: 0;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            box-shadow: none;
        }

        .piano-keys {
            display: flex;
            height: 100%;
            justify-content: center;
            gap: 1px;
            position: relative;
            z-index: 3;
        }

        .white-key, .black-key {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
            background: transparent;
            box-shadow: 
                0 0 15px rgba(120, 90, 210, 0.3),
                0 0 4px rgba(255, 255, 255, 0.2) inset,
                0 4px 12px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            color: transparent !important;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 0 15px #cbb5ff, 0 0 25px #a48eff !important;
            font-weight: 300;
            overflow: hidden;
        }

        .white-key {
            width: 50px;
            height: 100%;
            border-radius: 0 0 20px 20px;
            margin: 0 1px;
            font-size: 0.9rem;
            padding-bottom: 12px;
        }

        .black-key {
            width: 34px;
            height: 66%;
            border-radius: 0 0 18px 18px;
            margin: 0 -17px;
            z-index: 2;
            top: -4px;
            font-size: 0.7rem;
            padding-bottom: 8px;
            box-shadow: 
                0 0 15px #8f77e0,
                0 0 6px #dbb5ff inset,
                0 4px 12px black;
        }

        .white-key:hover, .black-key:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 0 30px rgba(160, 130, 240, 0.6),
                0 0 12px #ffffff inset,
                0 6px 16px rgba(0, 0, 0, 0.7);
            text-shadow: 0 0 15px white, 0 0 30px #e6d0ff, 0 0 45px #b69eff !important;
        }

        .white-key:active, .white-key.active,
        .black-key:active, .black-key.active {
            transform: translateY(3px);
            filter: brightness(1.3);
            box-shadow: 
                0 0 35px #ffffff,
                0 0 25px #b79eff,
                0 2px 8px rgba(0, 0, 0, 0.8) inset;
            text-shadow: 0 0 20px white, 0 0 40px #ffe6ff, 0 0 60px #c8b5ff !important;
        }

        .white-key::after, .black-key::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.25) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(160, 130, 240, 0.3) 0%, transparent 60%);
            mix-blend-mode: overlay;
            opacity: 0.5;
            animation: starBreath 5s infinite alternate;
        }

        @keyframes starBreath {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .btn-play {
            background: radial-gradient(circle at 30% 30%, #b09af0, #5a44b0);
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 2rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 
                0 15px 25px -5px #3f2d80, 
                0 0 0 3px rgba(255, 255, 255, 0.4) inset, 
                0 0 45px #b285ff;
            transition: all 0.3s;
            position: relative;
            animation: breathe 4s infinite alternate;
        }

        .btn-play i {
            filter: drop-shadow(0 0 8px white) drop-shadow(0 0 15px #d0b5ff);
            color: rgba(255, 255, 255, 0.9);
        }

        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .btn-play::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: inherit;
            filter: blur(20px);
            z-index: -1;
            opacity: 0.6;
            animation: pulseGlow 3s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 0.9; }
        }

        .btn-play:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 35px -3px #4f38a0, 0 0 0 4px rgba(255, 255, 255, 0.5) inset, 0 0 70px #dbb5ff;
        }

        .track-info {
            background: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border: none !important;
            box-shadow: none !important;
            padding: 12px 30px;
            color: white;
            font-size: 1.1rem;
            min-width: 240px;
            text-align: center;
            letter-spacing: 1.2px;
            transition: all 0.3s ease;
            text-shadow: 0 0 15px #d0b5ff, 0 0 30px #b69eff;
        }

        .track-name {
            background: linear-gradient(135deg, #ffffff, #e2d0ff, #d0b5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px #d0b5ff, 0 0 30px #b69eff;
            font-weight: 400;
        }

        .volume-slider {
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            padding: 8px 20px;
            border: none !important;
            box-shadow: none !important;
            transition: all 0.3s ease;
        }

        .volume-slider i {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            filter: drop-shadow(0 0 6px #d9c2ff) drop-shadow(0 0 10px #b29eff);
            transition: all 0.3s ease;
        }

        .volume-slider:hover i {
            filter: drop-shadow(0 0 10px #d9c2ff) drop-shadow(0 0 15px #b29eff);
            transform: scale(1.1);
        }

        input[type=range] {
            width: 110px;
            height: 5px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.1), rgba(150, 120, 230, 0.5));
            border-radius: 10px;
            -webkit-appearance: none;
            transition: all 0.3s ease;
        }

        input[type=range]:hover {
            background: linear-gradient(to right, rgba(255, 255, 255, 0.2), rgba(150, 120, 230, 0.7));
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(145deg, white, #e0d0ff);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px #d1b5ff, 0 0 12px #b59eff;
            border: 2px solid #c9b1ff;
            transition: all 0.2s ease;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 30px #d1b5ff, 0 0 18px #b59eff;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(200, 190, 250, 0.5);
            text-shadow: 0 0 12px #b29eff, 0 0 25px #8f72d9;
            letter-spacing: 3px;
            animation: fadeInOut 8s infinite alternate;
        }

        @keyframes fadeInOut {
            0% { opacity: 0.4; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        .whisper-star {
            position: fixed;
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #fffbe6, #d9b0ff);
            border-radius: 50%;
            box-shadow: 0 0 50px #f9f, 0 0 100px #adf;
            z-index: 200;
            pointer-events: none;
            animation: starRise 4.5s ease-out forwards;
            mix-blend-mode: screen;
        }

        @keyframes starRise {
            0% { transform: scale(0.5) rotate(0deg); opacity: 1; }
            30% { transform: scale(1.3) rotate(12deg); opacity: 1; }
            70% { transform: scale(1) rotate(-5deg); opacity: 0.8; }
            100% { transform: scale(0.2) rotate(25deg) translateY(-350px) translateX(70px); opacity: 0; }
        }

        .star-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
            backdrop-filter: blur(2px);
        }

        .message-content {
            max-width: 800px;
            padding: 30px 40px;
            text-align: center;
            font-family: 'Dancing Script', 'Quicksand', 'KaiTi', '楷体', '华文楷体', 'STKaiti', 'PingFang SC', 'Hiragino Sans GB', cursive;
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.7;
            background: linear-gradient(145deg, #ffebf8, #f3d7ff, #d4e0ff, #c2e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-color: transparent;
            border-radius: 70px;
            border: none !important;
            outline: none !important;
            box-shadow: none;
            text-shadow: 0 0 30px #ffc8ff, 0 0 60px #e2b5ff, 0 0 90px #b794ff, 0 0 120px #9a7aff;
            letter-spacing: 2px;
            white-space: pre-wrap;
            animation: textGlowPulse 4s infinite alternate ease-in-out;
            backdrop-filter: blur(6px) brightness(1.2);
        }

        @keyframes textGlowPulse {
            0% { text-shadow: 0 0 30px #ffc2f0, 0 0 55px #e2b0ff, 0 0 85px #c09aff, 0 0 110px #a07cff; }
            100% { text-shadow: 0 0 45px #ffe0ff, 0 0 80px #f2ceff, 0 0 120px #dbb5ff, 0 0 150px #b693ff; }
        }

        @media (max-width: 768px) {
            .message-content {
                font-size: 1.6rem;
                padding: 20px 25px;
                max-width: 90%;
            }
        }
        @media (max-width: 480px) {
            .message-content {
                font-size: 1.3rem;
                padding: 18px 20px;
            }
        }

        .star-msg {
            position: fixed;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle at 30% 30%, #fffcd1, #fbc2ff);
            border-radius: 50%;
            box-shadow: 0 0 20px #ffdbff, 0 0 40px #ddb5ff;
            z-index: 160;
            pointer-events: none;
            animation: msgStarFall 5s ease-out forwards;
        }
        @keyframes msgStarFall {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(400px) scale(0.2); opacity: 0; }
        }

        .bg-hidden {
            opacity: 0 !important;
            pointer-events: none;
        }

        #particles, #auroraCanvas {
            transition: opacity 1.5s ease;
        }

        @media (max-width: 768px) {
            .piano-player {
                padding: 20px 15px 25px;
                margin-top: 8vh;
            }
            .header h1 {
                font-size: 1.4rem;
                letter-spacing: 3px;
            }
            .piano-container {
                height: 160px;
            }
            .white-key {
                width: 40px;
                font-size: 0.8rem;
            }
            .black-key {
                width: 28px;
                font-size: 0.6rem;
                margin: 0 -14px;
            }
            .controls {
                gap: 15px;
            }
            .btn-play {
                width: 60px;
                height: 60px;
                font-size: 1.6rem;
            }
            .track-info {
                padding: 8px 20px;
                font-size: 0.9rem;
                min-width: 180px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="gift-cover" id="giftCover">
    <div class="gift-title">
        <div class="main-text">to 龟龟</div>
        <div class="sub-text">Gift from the Stars</div>
    </div>
    <div class="gift-particles" id="giftParticles"></div>
</div>

<div class="star-message" id="starMessage">
    <div class="message-content" id="messageContent"></div>
</div>

<div class="nebula-bg" id="nebulaBg"></div>
<div class="floating-glow" id="floatingGlow">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
</div>

<div class="orbital-objects" id="orbitalObjects"></div>
<div class="meteor-container" id="meteorContainer"></div>
<div class="particles" id="particles" style="opacity:0.3;"></div>

<canvas id="auroraCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: block; transition: opacity 1.5s ease;"></canvas>

<div class="piano-player" id="pianoPlayer">
    <div class="header">
        <div class="header-left">
            <span class="piano-icon"><i class="fas fa-moon"></i> <i class="fas fa-sparkles"></i></span>
            <h1>Fantasy Piano</h1>
        </div>
    </div>

    <div class="wave-bar">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="piano-container">
        <div class="piano-keys" id="pianoKeys">
            <div class="white-key" data-note="c4">C</div>
            <div class="black-key" data-note="c#4">C#</div>
            <div class="white-key" data-note="d4">D</div>
            <div class="black-key" data-note="d#4">D#</div>
            <div class="white-key" data-note="e4">E</div>
            <div class="white-key" data-note="f4">F</div>
            <div class="black-key" data-note="f#4">F#</div>
            <div class="white-key" data-note="g4">G</div>
            <div class="black-key" data-note="g#4">G#</div>
            <div class="white-key" data-note="a4">A</div>
            <div class="black-key" data-note="a#4">A#</div>
            <div class="white-key" data-note="b4">B</div>
            <div class="white-key" data-note="c5">C</div>
            <div class="black-key" data-note="c#5">C#</div>
            <div class="white-key" data-note="d5">D</div>
        </div>
    </div>

    <audio id="bgMusic" preload="metadata" loop>
        <source src="飞侠Shrimp - Terrasphere 钢琴版.mp3" type="audio/mpeg">
    

    <div class="controls">
        <button class="btn-play" id="playPauseBtn"><i class="fas fa-play" id="playIcon"></i></button>
        <div class="track-info" id="trackInfo">
            <i class="fas fa-compact-disc fa-spin" style="--fa-animation-duration: 8s;"></i> 
            <span class="track-name" id="currentTrackName">Terrasphere</span>
        </div>
        <div class="volume-slider">
            <i class="fas fa-volume-low"></i>
            <input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.7">
            <i class="fas fa-volume-high"></i>
        </div>
    </div>
    <div class="footer-note"> ✦ A gentle touch, the galaxy whispers ✦ </div>
</div>

<script>
    const bgMusic = document.getElementById('bgMusic');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const volumeControl = document.getElementById('volumeControl');
    const currentTrackName = document.getElementById('currentTrackName');
    const giftCover = document.getElementById('giftCover');
    const pianoPlayer = document.getElementById('pianoPlayer');
    const giftParticles = document.getElementById('giftParticles');
    const starMessage = document.getElementById('starMessage');
    const messageContent = document.getElementById('messageContent');

    const fullText = `龟龟，
我把你喜欢的钢琴曲，藏进了这片星空。
你说你喜欢星星，
所以我让它们落下来，变成了琴键。
当你按下时，整个宇宙都会为你轻轻和鸣。

愿这些旋律，
像星星一样，一直闪烁在你的夜空里。`;

    const bgElements = [
        document.getElementById('nebulaBg'),
        document.getElementById('floatingGlow'),
        document.getElementById('orbitalObjects'),
        document.getElementById('meteorContainer'),
        document.getElementById('particles'),
        document.getElementById('auroraCanvas')
    ].filter(el => el);

    let audioCtx = null;
    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTypeSound() {
        if (!audioCtx) initAudioContext();
        if (audioCtx.state !== 'running') return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 800;
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.02);
    }

    function hideStarBackground() {
        bgElements.forEach(el => {
            el.style.transition = 'none';
            el.classList.add('bg-hidden');
            el.offsetHeight;
            el.style.transition = '';
        });
    }

    function createGiftParticles() {
        for (let i = 0; i < 80; i++) {
            const p = document.createElement('div');
            p.className = 'gift-particle';
            p.style.left = p.style.top = '50%';
            giftParticles.appendChild(p);
        }
    }

    function playGiftParticles() {
        giftParticles.style.opacity = '1';
        const ps = giftParticles.querySelectorAll('.gift-particle');
        ps.forEach((p, i) => {
            setTimeout(() => {
                const ang = Math.random() * Math.PI * 2;
                const dis = Math.random() * 200 + 50;
                const dur = Math.random() * 2 + 1;
                p.style.transition = `all ${dur}s cubic-bezier(0.19,1,0.22,1)`;
                p.style.opacity = '1';
                p.style.transform = `translate(${Math.cos(ang)*dis}px, ${Math.sin(ang)*dis}px) scale(${Math.random()*1.5+0.5})`;
                setTimeout(() => {
                    p.style.opacity = '0';
                    p.style.transform = `translate(${Math.cos(ang)*(dis+50)}px, ${Math.sin(ang)*(dis+50)}px) scale(0)`;
                }, dur*800);
            }, i*20);
        });
    }

    function createFloatingStar() {
        const s = document.createElement('div');
        s.className = 'star-msg';
        s.style.left = Math.random()*100+'%';
        s.style.top = '-10px';
        s.style.width = s.style.height = (Math.random()*8+4)+'px';
        document.body.appendChild(s);
        setTimeout(()=>s.remove(), 8000);
    }

    function showStarMessage(callback) {
        starMessage.style.display = 'flex';
        setTimeout(()=>starMessage.style.opacity='1',20);
        messageContent.textContent = '';
        let i=0;
        const t = setInterval(()=>{
            if(i<fullText.length){
                messageContent.textContent += fullText[i];
                playTypeSound();
                i++;
            }else{
                clearInterval(t);
                setTimeout(()=>{
                    starMessage.style.opacity='0';
                    setTimeout(()=>{
                        starMessage.style.display='none';
                        if(callback) callback();
                    },2000);
                },2000);
            }
        },100);
        for(let j=0;j<20;j++) setTimeout(createFloatingStar,j*80);
        setInterval(createFloatingStar,500);
    }

    function animateKeysFromBottom(onComplete) {
        const keys = document.querySelectorAll('.white-key, .black-key');
        keys.forEach(k=>{
            k.style.transition='opacity 0.4s cubic-bezier(0.2,0.9,0.3,1), transform 0.4s cubic-bezier(0.2,0.9,0.3,1)';
            k.style.opacity='0';
            k.style.transform='translateY(100%)';
            k.style.pointerEvents='none';
        });
        keys.forEach((k,i)=>{
            setTimeout(()=>{
                k.style.opacity='1';
                k.style.transform='translateY(0)';
            },i*80);
        });
        setTimeout(()=>{
            keys.forEach(k=>{
                k.style.transition='';
                k.style.opacity='';
                k.style.transform='';
                k.style.pointerEvents='';
            });
            if(onComplete) onComplete();
        }, keys.length*80+400);
    }

    function startRandomBlinking() {
        const keys = document.querySelectorAll('.white-key, .black-key');
        keys.forEach(k=>{
            function blink(){
                setTimeout(()=>{
                    k.classList.add('active');
                    setTimeout(()=>{
                        k.classList.remove('active');
                        blink();
                    }, Math.random()*250+100);
                }, Math.random()*4400+600);
            }
            blink();
        });
    }

    function togglePlay() {
        if (bgMusic.paused) {
            initAudioContext();
            bgMusic.play();
            playIcon.className = 'fas fa-pause';
        } else {
            bgMusic.pause();
            playIcon.className = 'fas fa-play';
        }
    }

    volumeControl.addEventListener('input', function(){
        bgMusic.volume = this.value;
    });

    playPauseBtn.addEventListener('click', togglePlay);

    giftCover.addEventListener('click', function(){
        playGiftParticles();
        giftCover.classList.add('hidden');
        initAudioContext();
        hideStarBackground();
        
        showStarMessage(function(){
            const starGroup = [document.getElementById('orbitalObjects'),document.getElementById('meteorContainer'),document.getElementById('particles')].filter(el=>el);
            const nebulaGroup = [document.getElementById('nebulaBg'),document.getElementById('floatingGlow'),document.getElementById('auroraCanvas')].filter(el=>el);

            starGroup.forEach(el=>el.classList.remove('bg-hidden'));

            setTimeout(()=>{
                nebulaGroup.forEach(el=>el.classList.remove('bg-hidden'));
            },1800);

            setTimeout(()=>{
                pianoPlayer.classList.add('visible');
                animateKeysFromBottom(function(){
                    startRandomBlinking();
                });
                setTimeout(()=>{
                    togglePlay();
                },800);
            },2100);
        });
    });

    (function createSimpleParticles(){
        const container = document.getElementById('particles');
        if(!container) return;
        for(let i=0;i<80;i++){
            const p = document.createElement('div');
            p.className = 'particle';
            const s = Math.random()*6+1;
            p.style.width = s+'px';
            p.style.height = s+'px';
            p.style.left = Math.random()*100+'%';
            p.style.animationDelay = Math.random()*20+'s';
            p.style.animationDuration = (Math.random()*20+15)+'s';
            const hue = 200+Math.random()*60;
            p.style.background = `hsla(${hue},70%,80%,0.6)`;
            p.style.boxShadow = `0 0 15px hsla(${hue},80%,70%,0.8)`;
            container.appendChild(p);
        }
    })();

    (function createOrbitalElements(){
        const container = document.getElementById('orbitalObjects');
        if(!container) return;
        const belt = document.createElement('div');
        belt.className = 'asteroid-belt';
        for(let i=0;i<25;i++){
            const ast = document.createElement('div');
            ast.className = 'asteroid';
            const angle = (i/25)*360+Math.random()*30;
            const r = 30+Math.random()*20;
            ast.style.transform = `rotate(${angle}deg) translateX(${r}vmin)`;
            const sz = 6+Math.random()*12;
            ast.style.width = sz+'px';
            ast.style.height = sz+'px';
            const hue = 200+Math.random()*40;
            ast.style.background = `radial-gradient(circle at 30% 30%, hsl(${hue},90%,80%), hsl(${hue},90%,35%))`;
            ast.style.boxShadow = `0 0 ${10+Math.random()*30}px hsl(${hue},80%,60%), 0 0 40px hsl(${hue},80%,50%)`;
            belt.appendChild(ast);
        }
        container.appendChild(belt);

        const orbit1 = document.createElement('div');
        orbit1.className = 'satellite-orbit';
        orbit1.style.animationDuration = '42s';
        const sat1 = document.createElement('div');
        sat1.className = 'satellite';
        sat1.style.transform = 'rotate(70deg) translateX(28vmin)';
        sat1.style.background = 'radial-gradient(circle at 30% 30%, #b8d0ff, #7f9fd0)';
        sat1.style.width = '26px';
        sat1.style.height = '26px';
        sat1.style.boxShadow = '0 0 50px #9ab3ff, 0 0 90px #6f8fdf';
        orbit1.appendChild(sat1);
        container.appendChild(orbit1);

        const orbit2 = document.createElement('div');
        orbit2.className = 'satellite-orbit';
        orbit2.style.animationDuration = '35s';
        const sat2 = document.createElement('div');
        sat2.className = 'satellite';
        sat2.style.transform = 'rotate(200deg) translateX(38vmin)';
        sat2.style.background = 'radial-gradient(circle at 30% 30%, #c0cfff, #8f9fcf)';
        sat2.style.width = '22px';
        sat2.style.height = '22px';
        sat2.style.boxShadow = '0 0 40px #9fb0ff, 0 0 70px #7f8fdf';
        const ring2 = document.createElement('div');
        ring2.style.position = 'absolute';
        ring2.style.top = '50%';
        ring2.style.left = '50%';
        ring2.style.width = '38px';
        ring2.style.height = '12px';
        ring2.style.background = 'rgba(110,150,240,0.3)';
        ring2.style.borderRadius = '50%';
        ring2.style.transform = 'translate(-50%, -50%) rotate(25deg)';
        ring2.style.filter = 'blur(4px)';
        ring2.style.boxShadow = '0 0 30px #9fb0ff';
        sat2.appendChild(ring2);
        orbit2.appendChild(sat2);
        container.appendChild(orbit2);

        const ringBig = document.createElement('div');
        ringBig.className = 'ring';
        ringBig.style.border = '4px dotted rgba(80,140,230,0.2)';
        ringBig.style.boxShadow = '0 0 70px rgba(60,120,220,0.25), inset 0 0 60px rgba(60,120,220,0.1)';
        container.appendChild(ringBig);

        const ringSmall = document.createElement('div');
        ringSmall.className = 'ring ring-small';
        ringSmall.style.border = '3px dotted rgba(100,160,240,0.25)';
        ringSmall.style.boxShadow = '0 0 60px rgba(80,140,230,0.3), inset 0 0 50px rgba(80,140,230,0.15)';
        container.appendChild(ringSmall);

        for(let i=0;i<8;i++){
            const er = document.createElement('div');
            er.className = 'extra-ring';
            const size = 20+i*6;
            er.style.width = size+'vmin';
            er.style.height = size+'vmin';
            er.style.border = `1px dotted rgba(90,150,240,${0.05+i*0.01})`;
            er.style.boxShadow = `0 0 ${20+i*5}px rgba(70,130,230,0.1), inset 0 0 ${15+i*3}px rgba(70,130,230,0.06)`;
            er.style.animation = `ringPulse ${14+i*2}s infinite alternate`;
            er.style.animationDelay = `${i*0.5}s`;
            container.appendChild(er);
        }
    })();

    (function createMeteors(){
        const container = document.getElementById('meteorContainer');
        if(!container) return;
        for(let i=0;i<20;i++){
            const m = document.createElement('div');
            m.className = 'meteor';
            m.style.left = Math.random()*30+'%';
            m.style.top = Math.random()*30+'%';
            m.style.width = (120+Math.random()*150)+'px';
            m.style.animationDuration = (8+Math.random()*12)+'s';
            m.style.animationDelay = (Math.random()*20)+'s';
            const hue = 200+Math.random()*30;
            m.style.background = `linear-gradient(90deg, hsla(${hue},80%,70%,0.6) 0%, hsla(${hue},70%,60%,0.2) 60%, transparent 100%)`;
            container.appendChild(m);
        }
    })();

    (function auroraCanvas(){
        const canvas = document.getElementById('auroraCanvas');
        const ctx = canvas.getContext('2d');
        let w,h,t=0;
        function resize(){ w=window.innerWidth; h=window.innerHeight; canvas.width=w; canvas.height=h; }
        resize(); window.addEventListener('resize',resize);
        function draw(){
            ctx.clearRect(0,0,w,h);
            ctx.save();
            ctx.filter='blur(25px)'; ctx.globalAlpha=0.35;
            ctx.beginPath();
            for(let x=0;x<w;x+=30){
                const y=h*0.6+Math.sin(x*0.003+t*0.8)*70+Math.cos(x*0.005+t*1.2)*50;
                x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
            const g1=ctx.createLinearGradient(0,0,w*0.5,0);
            g1.addColorStop(0,'rgba(60,210,230,0.2)');
            g1.addColorStop(0.6,'rgba(110,90,250,0.35)');
            g1.addColorStop(1,'rgba(180,80,240,0.2)');
            ctx.fillStyle=g1; ctx.fill();

            ctx.beginPath();
            for(let x=0;x<w;x+=30){
                const y=h*0.2+Math.sin(x*0.004+t*1.5)*80+Math.cos(x*0.006+t*0.9)*60;
                x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.lineTo(w,0); ctx.lineTo(0,0); ctx.closePath();
            const g2=ctx.createLinearGradient(0,0,w*0.7,0);
            g2.addColorStop(0,'rgba(150,70,230,0.25)');
            g2.addColorStop(0.5,'rgba(90,130,250,0.3)');
            g2.addColorStop(1,'rgba(40,190,220,0.15)');
            ctx.fillStyle=g2; ctx.fill();
            ctx.restore();
            t+=0.02;
            requestAnimationFrame(draw);
        }
        draw();
    })();

    createGiftParticles();
</script>
</body>
</html>
