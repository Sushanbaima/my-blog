<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>piano </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #010005;
            font-family: 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            color: #fff;
            background-image: 
                radial-gradient(circle at 15% 30%, rgba(25, 15, 55, 0.6) 0%, transparent 35%),
                radial-gradient(circle at 90% 70%, rgba(15, 25, 65, 0.7) 0%, transparent 45%),
                radial-gradient(circle at 40% 85%, rgba(40, 10, 60, 0.5) 0%, transparent 50%);
            background-blend-mode: overlay;
        }

        /* 封面 —— 深邃星空礼物 */
        .gift-cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: radial-gradient(ellipse at center, #0b0720 0%, #010002 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
            overflow: hidden;
        }

        .gift-cover.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.2);
        }

        /* 标题容器：flex列居中，不再包含渐变背景 (由子元素承担) */
        .gift-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: floatTitle 6s infinite alternate ease-in-out;
            text-align: center;
            padding: 0 20px;
            /* 移除字体大小、渐变、阴影，由子元素控制 */
        }

        /* 主文字 —— to 龟龟 (更大更闪耀) */
        .gift-title .main-text {
            font-size: 5rem;           /* 明显大于副标题 */
            letter-spacing: 12px;
            background: linear-gradient(135deg, #ffffff, #f2dbff, #dab0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.9), 0 0 100px #c08eff, 0 0 150px #a05eff;
            margin-bottom: 15px;        /* 与下方英文间距 */
            line-height: 1.2;
            white-space: nowrap;        /* 防止换行 */
        }

        /* 副文字 —— 原英文 (放在正下方) */
        .gift-title .sub-text {
            font-size: 2.4rem;          /* 比主文字小，但保留原本气质 */
            letter-spacing: 10px;
            background: linear-gradient(135deg, #ffffff, #d4b5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 80px #a88eff;
            line-height: 1.3;
            white-space: nowrap;
        }

        @keyframes floatTitle {
            0% { transform: translateY(0px); opacity: 0.95; }
            100% { transform: translateY(-15px); opacity: 1; }
        }

        /* 移动端调整 */
        @media (max-width: 768px) {
            .gift-title .main-text {
                font-size: 3.2rem;
                letter-spacing: 8px;
                margin-bottom: 10px;
            }
            .gift-title .sub-text {
                font-size: 1.8rem;
                letter-spacing: 6px;
            }
        }

        @media (max-width: 480px) {
            .gift-title .main-text {
                font-size: 2.5rem;
                letter-spacing: 5px;
            }
            .gift-title .sub-text {
                font-size: 1.4rem;
                letter-spacing: 4px;
            }
        }

        .gift-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
            opacity: 0;
        }

        .gift-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #ffd0ff, 0 0 30px #ffd0ff;
            opacity: 0;
        }

        /* 星云背景 (固定) */
        .nebula-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at 30% 50%, #121530, #000001 95%);
            overflow: hidden;
            animation: bgShift 80s infinite alternate ease-in-out;
        }

        @keyframes bgShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 15% 15%; }
        }

        .floating-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .glow {
            position: absolute;
            width: 70vmax;
            height: 70vmax;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(70, 40, 160, 0.15) 0%, transparent 70%);
            animation: float 30s infinite alternate ease-in-out;
            filter: blur(70px);
        }

        .glow-1 {
            top: -20%;
            left: -20%;
            background: radial-gradient(circle, rgba(80, 40, 180, 0.2) 0%, transparent 70%);
            animation-duration: 35s;
        }

        .glow-2 {
            bottom: -30%;
            right: -15%;
            background: radial-gradient(circle, rgba(30, 80, 200, 0.2) 0%, transparent 70%);
            animation-duration: 40s;
        }

        .glow-3 {
            top: 40%;
            left: 60%;
            width: 100vmin;
            height: 100vmin;
            background: radial-gradient(circle, rgba(120, 50, 200, 0.15) 0%, transparent 70%);
            animation: pulse 20s infinite;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(8%, 10%) scale(1.5); opacity: 0.5; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.6); }
        }

        /* 轨道天体、小行星等 (不变) */
        .orbital-objects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: visible;
        }

        @keyframes orbitRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes ringPulse {
            0% { opacity: 0.1; transform: scale(1); filter: blur(1px); }
            50% { opacity: 0.25; transform: scale(1.05); filter: blur(2px); }
            100% { opacity: 0.1; transform: scale(1); filter: blur(1px); }
        }

        .asteroid-belt {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 1px;
            height: 1px;
            animation: orbitRotate 200s linear infinite;
            transform-origin: center;
        }

        .asteroid {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transform-origin: center;
            box-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
        }

        .asteroid::after {
            content: '';
            position: absolute;
            top: -40%;
            left: -40%;
            width: 180%;
            height: 180%;
            border-radius: 50%;
            border: 1.5px dotted rgba(70, 140, 240, 0.4);
            box-shadow: 0 0 25px rgba(40, 100, 220, 0.4), inset 0 0 15px rgba(50, 110, 230, 0.2);
            pointer-events: none;
            animation: ringPulse 5s infinite alternate;
            transform: rotate(0deg);
        }

        .satellite {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 22px;
            height: 22px;
            background: radial-gradient(circle at 30% 30%, #9ab0e0, #5f7ab0);
            border-radius: 50%;
            box-shadow: 0 0 30px #6f8fdf, 0 0 60px #4f6fbf;
            transform-origin: center;
            opacity: 1;
        }

        .satellite-orbit {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 1px;
            height: 1px;
            animation: orbitRotate 40s linear infinite;
            transform-origin: center;
        }

        .satellite::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 10px;
            background: rgba(90, 140, 240, 0.25);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(20deg);
            box-shadow: 0 0 30px #6f8fdf;
            filter: blur(3px);
        }

        .ring {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 50vmin;
            height: 50vmin;
            border: 3px dotted rgba(70, 130, 220, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 70px rgba(50, 100, 200, 0.25), inset 0 0 60px rgba(50, 100, 200, 0.1);
            animation: ringPulse 12s infinite alternate;
        }

        .ring-small {
            width: 35vmin;
            height: 35vmin;
            border: 2px dotted rgba(90, 150, 240, 0.25);
            box-shadow: 0 0 60px rgba(70, 120, 220, 0.3), inset 0 0 50px rgba(70, 120, 220, 0.15);
            animation-duration: 16s;
        }

        .extra-ring {
            position: absolute;
            left: 50%;
            top: 50%;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border-style: dotted;
            pointer-events: none;
            animation: ringPulse infinite alternate;
        }

        .meteor-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            overflow: hidden;
        }

        .meteor {
            position: absolute;
            width: 180px;
            height: 2px;
            background: linear-gradient(90deg, rgba(130, 180, 255, 0.7) 0%, rgba(80, 130, 240, 0.2) 70%, transparent 100%);
            border-radius: 50%;
            filter: blur(2px);
            transform: rotate(35deg);
            opacity: 0;
            box-shadow: 0 0 30px #6f9eff, 0 0 60px #4f7ed0;
            animation: meteorFall linear infinite;
        }

        @keyframes meteorFall {
            0% {
                transform: translate(-20vw, -20vh) rotate(35deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            80% {
                opacity: 0.3;
            }
            100% {
                transform: translate(130vw, 130vh) rotate(35deg);
                opacity: 0;
            }
        }

        /* 钢琴主界面 (完全透明无框) */
        .piano-player {
            position: relative;
            z-index: 10;
            width: 850px;
            max-width: 92vw;
            margin: 12vh auto 5vh auto;
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-radius: 0;
            padding: 25px 25px 30px;
            transition: transform 0.3s ease, opacity 1s ease;
            opacity: 0;
            transform: translateY(50px);
        }

        .piano-player.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .piano-player:hover {
            transform: translateY(-5px);
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .piano-icon {
            font-size: 2.4rem;
            filter: drop-shadow(0 0 20px #a88eff);
            color: rgba(255, 255, 255, 0.8);
            animation: rotateIcon 15s infinite linear;
            text-shadow: 0 0 10px #fff, 0 0 20px #b6a2ff;
        }

        @keyframes rotateIcon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header h1 {
            font-weight: 300;
            font-size: 1.8rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffffff, #cfc2ff, #b8a0ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 2px solid rgba(255, 255, 255, 0.3);
            padding-left: 18px;
            text-shadow: 0 0 30px #cbb5ff, 0 0 60px #a48eff;
            animation: gradientShift 8s infinite alternate;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .wave-bar {
            display: flex;
            justify-content: center;
            gap: 6px;
            height: 70px;
            margin: 0 0 20px;
            position: relative;
        }

        .wave-bar::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 8px;
            background: rgba(120, 90, 220, 0.2);
            border-radius: 50%;
            filter: blur(8px);
        }

        .wave-bar span {
            width: 5px;
            height: 20px;
            background: linear-gradient(to top, #9f87f0, #cbb5ff, #f0e0ff);
            background-size: 200% 200%;
            border-radius: 20px;
            animation: waveGlow 2.4s infinite ease-in-out, gradientFlow 4s infinite alternate;
            box-shadow: 0 0 15px #b09eff;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 100%; }
            100% { background-position: 0% 0%; }
        }

        .wave-bar span:nth-child(2) { animation-delay: 0.2s; height: 36px; }
        .wave-bar span:nth-child(3) { animation-delay: 0.4s; height: 52px; }
        .wave-bar span:nth-child(4) { animation-delay: 0.6s; height: 62px; }
        .wave-bar span:nth-child(5) { animation-delay: 0.8s; height: 54px; }
        .wave-bar span:nth-child(6) { animation-delay: 1.0s; height: 42px; }
        .wave-bar span:nth-child(7) { animation-delay: 1.2s; height: 30px; }
        .wave-bar span:nth-child(8) { animation-delay: 1.4s; height: 39px; }
        .wave-bar span:nth-child(9) { animation-delay: 1.6s; height: 50px; }
        .wave-bar span:nth-child(10) { animation-delay: 1.8s; height: 34px; }
        .wave-bar span:nth-child(11) { animation-delay: 2.0s; height: 25px; }
        .wave-bar span:nth-child(12) { animation-delay: 0.3s; height: 46px; }

        @keyframes waveGlow {
            0%, 100% { transform: scaleY(0.7); opacity: 0.7; filter: hue-rotate(0deg); }
            50% { transform: scaleY(1.4); opacity: 1; filter: hue-rotate(8deg) brightness(1.3); }
        }

        .piano-container {
            position: relative;
            height: 200px;
            display: flex;
            justify-content: center;
            margin: 15px 0 25px;
            padding: 12px 0;
            background: transparent;
            border-radius: 0;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            box-shadow: none;
        }

        .piano-keys {
            display: flex;
            height: 100%;
            justify-content: center;
            gap: 1px;
            position: relative;
            z-index: 3;
        }

        .white-key, .black-key {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
            background: transparent;
            box-shadow: 
                0 0 15px rgba(120, 90, 210, 0.3),
                0 0 4px rgba(255, 255, 255, 0.2) inset,
                0 4px 12px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            color: transparent !important;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 0 15px #cbb5ff, 0 0 25px #a48eff !important;
            font-weight: 300;
            overflow: hidden;
        }

        .white-key {
            width: 50px;
            height: 100%;
            border-radius: 0 0 20px 20px;
            margin: 0 1px;
            font-size: 0.9rem;
            padding-bottom: 12px;
        }

        .black-key {
            width: 34px;
            height: 66%;
            border-radius: 0 0 18px 18px;
            margin: 0 -17px;
            z-index: 2;
            top: -4px;
            font-size: 0.7rem;
            padding-bottom: 8px;
            box-shadow: 
                0 0 15px #8f77e0,
                0 0 6px #dbb5ff inset,
                0 4px 12px black;
        }

        .white-key:hover, .black-key:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 0 30px rgba(160, 130, 240, 0.6),
                0 0 12px #ffffff inset,
                0 6px 16px rgba(0, 0, 0, 0.7);
            text-shadow: 0 0 15px white, 0 0 30px #e6d0ff, 0 0 45px #b69eff !important;
        }

        .white-key:active, .white-key.active,
        .black-key:active, .black-key.active {
            transform: translateY(3px);
            filter: brightness(1.3);
            box-shadow: 
                0 0 35px #ffffff,
                0 0 25px #b79eff,
                0 2px 8px rgba(0, 0, 0, 0.8) inset;
            text-shadow: 0 0 20px white, 0 0 40px #ffe6ff, 0 0 60px #c8b5ff !important;
        }

        .white-key::after, .black-key::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.25) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(160, 130, 240, 0.3) 0%, transparent 60%);
            mix-blend-mode: overlay;
            opacity: 0.5;
            animation: starBreath 5s infinite alternate;
        }

        @keyframes starBreath {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .btn-play {
            background: radial-gradient(circle at 30% 30%, #b09af0, #5a44b0);
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 2rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 
                0 15px 25px -5px #3f2d80, 
                0 0 0 3px rgba(255, 255, 255, 0.4) inset, 
                0 0 45px #b285ff;
            transition: all 0.3s;
            position: relative;
            animation: breathe 4s infinite alternate;
        }

        .btn-play i {
            filter: drop-shadow(0 0 8px white) drop-shadow(0 0 15px #d0b5ff);
            color: rgba(255, 255, 255, 0.9);
        }

        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .btn-play::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: inherit;
            filter: blur(20px);
            z-index: -1;
            opacity: 0.6;
            animation: pulseGlow 3s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 0.9; }
        }

        .btn-play:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 35px -3px #4f38a0, 0 0 0 4px rgba(255, 255, 255, 0.5) inset, 0 0 70px #dbb5ff;
        }

        .track-info {
            background: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border: none !important;
            box-shadow: none !important;
            padding: 12px 30px;
            color: white;
            font-size: 1.1rem;
            min-width: 240px;
            text-align: center;
            letter-spacing: 1.2px;
            transition: all 0.3s ease;
            text-shadow: 0 0 15px #d0b5ff, 0 0 30px #b69eff;
        }

        .track-name {
            background: linear-gradient(135deg, #ffffff, #e2d0ff, #d0b5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px #d0b5ff, 0 0 30px #b69eff;
            font-weight: 400;
        }

        .volume-slider {
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            padding: 8px 20px;
            border: none !important;
            box-shadow: none !important;
            transition: all 0.3s ease;
        }

        .volume-slider i {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            filter: drop-shadow(0 0 6px #d9c2ff) drop-shadow(0 0 10px #b29eff);
            transition: all 0.3s ease;
        }

        .volume-slider:hover i {
            filter: drop-shadow(0 0 10px #d9c2ff) drop-shadow(0 0 15px #b29eff);
            transform: scale(1.1);
        }

        input[type=range] {
            width: 110px;
            height: 5px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.1), rgba(150, 120, 230, 0.5));
            border-radius: 10px;
            -webkit-appearance: none;
            transition: all 0.3s ease;
        }

        input[type=range]:hover {
            background: linear-gradient(to right, rgba(255, 255, 255, 0.2), rgba(150, 120, 230, 0.7));
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(145deg, white, #e0d0ff);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px #d1b5ff, 0 0 12px #b59eff;
            border: 2px solid #c9b1ff;
            transition: all 0.2s ease;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 30px #d1b5ff, 0 0 18px #b59eff;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(200, 190, 250, 0.5);
            text-shadow: 0 0 12px #b29eff, 0 0 25px #8f72d9;
            letter-spacing: 3px;
            animation: fadeInOut 8s infinite alternate;
        }

        @keyframes fadeInOut {
            0% { opacity: 0.4; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        @keyframes starRise {
            0% { transform: scale(0.5) rotate(0deg); opacity: 1; }
            30% { transform: scale(1.3) rotate(12deg); opacity: 1; }
            70% { transform: scale(1) rotate(-5deg); opacity: 0.8; }
            100% { transform: scale(0.2) rotate(25deg) translateY(-350px) translateX(70px); opacity: 0; }
        }
        .whisper-star {
            position: fixed;
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #fffbe6, #d9b0ff);
            border-radius: 50%;
            box-shadow: 0 0 50px #f9f, 0 0 100px #adf;
            z-index: 200;
            pointer-events: none;
            animation: starRise 4.5s ease-out forwards;
            mix-blend-mode: screen;
        }

        @media (max-width: 768px) {
            .piano-player {
                padding: 20px 15px 25px;
                margin-top: 8vh;
            }
            .header h1 {
                font-size: 1.4rem;
                letter-spacing: 3px;
            }
            .piano-container {
                height: 160px;
            }
            .white-key {
                width: 40px;
                font-size: 0.8rem;
            }
            .black-key {
                width: 28px;
                font-size: 0.6rem;
                margin: 0 -14px;
            }
            .controls {
                gap: 15px;
            }
            .btn-play {
                width: 60px;
                height: 60px;
                font-size: 1.6rem;
            }
            .track-info {
                padding: 8px 20px;
                font-size: 0.9rem;
                min-width: 180px;
            }
        }
    </style>

<body>

        <div class="piano-container">
            <div class="piano-keys" id="pianoKeys">

                <div class="black-key" data-note="d#4">D#</div>
                <div class="white-key" data-note="e4">E</div>
                <div class="white-key" data-note="f4">F</div>

        <audio id="bgMusic" preload="metadata" loop>

                <i class="fas fa-volume-high"></i>
            </div>
        </div>
        <div class="footer-note"> ✦ A gentle touch, the galaxy whispers ✦ </div>
    </div>

    <script>
        (function() {
            const giftCover = document.getElementById('giftCover');
            const pianoPlayer = document.getElementById('pianoPlayer');
            const giftParticles = document.getElementById('giftParticles');
            
            function createGiftParticles() {
                for (let i = 0; i < 80; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'gift-particle';
                    particle.style.left = '50%';
                    particle.style.top = '50%';
                    particle.style.opacity = '0';
                    giftParticles.appendChild(particle);
                }
            }
            
            function playGiftParticles() {
                giftParticles.style.opacity = '1';
                const particles = giftParticles.querySelectorAll('.gift-particle');
                
                particles.forEach((particle, index) => {
                    setTimeout(() => {
                        const angle = Math.random() * Math.PI * 2;
                        const distance = Math.random() * 200 + 50;
                        const duration = Math.random() * 2 + 1;
                        
                        particle.style.transition = `all ${duration}s cubic-bezier(0.19, 1, 0.22, 1)`;
                        particle.style.opacity = '1';
                        particle.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(${Math.random() * 1.5 + 0.5})`;
                        
                        setTimeout(() => {
                            particle.style.opacity = '0';
                            particle.style.transform = `translate(${Math.cos(angle) * (distance + 50)}px, ${Math.sin(angle) * (distance + 50)}px) scale(0)`;
                        }, duration * 800);
                    }, index * 20);
                });
            }
            
            createGiftParticles();

            function startRandomBlinking() {
                const keys = document.querySelectorAll('.white-key, .black-key');
                keys.forEach(k => k.classList.remove('active'));

                keys.forEach(key => {
                    function blink() {
                        const nextDelay = Math.random() * 4400 + 600; 
                        setTimeout(() => {
                            key.classList.add('active');
                            const glowDuration = Math.random() * 250 + 100;
                            setTimeout(() => {
                                key.classList.remove('active');
                                blink();
                            }, glowDuration);
                        }, nextDelay);
                    }
                    blink();
                });
            }

            giftCover.addEventListener('click', () => {
                playGiftParticles();
                giftCover.classList.add('hidden');
                setTimeout(() => {
                    pianoPlayer.classList.add('visible');
                    startRandomBlinking();
                    setTimeout(() => {
                        togglePlay();
                    }, 800);
                }, 800);
            });

            function createSimpleParticles() {
                const container = document.getElementById('particles');
                if (!container) return;
                for (let i = 0; i < 80; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const size = Math.random() * 6 + 1;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 20 + 's';
                    particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
                    const hue = Math.random() * 60 + 200;
                    particle.style.background = `hsla(${hue}, 70%, 80%, 0.6)`;
                    particle.style.boxShadow = `0 0 15px hsla(${hue}, 80%, 70%, 0.8)`;
                    container.appendChild(particle);
                }
            }
            createSimpleParticles();

            function createOrbitalElements() {
                const container = document.getElementById('orbitalObjects');
                if (!container) return;

                const belt = document.createElement('div');
                belt.className = 'asteroid-belt';
                for (let i = 0; i < 25; i++) {
                    const ast = document.createElement('div');
                    ast.className = 'asteroid';
                    const angle = (i / 25) * 360 + Math.random() * 30;
                    const r = 30 + Math.random() * 20;
                    ast.style.transform = `rotate(${angle}deg) translateX(${r}vmin)`;
                    const s = 6 + Math.random() * 12;
                    ast.style.width = s + 'px';
                    ast.style.height = s + 'px';
                    
                    const hue = 200 + Math.random() * 40;
                    ast.style.background = `radial-gradient(circle at 30% 30%, hsl(${hue}, 90%, 80%), hsl(${hue}, 90%, 35%))`;
                    ast.style.boxShadow = `0 0 ${10+Math.random()*30}px hsl(${hue}, 80%, 60%), 0 0 40px hsl(${hue}, 80%, 50%)`;
                    
                    belt.appendChild(ast);
                }
                container.appendChild(belt);

                const orbit1 = document.createElement('div');
                orbit1.className = 'satellite-orbit';
                orbit1.style.animationDuration = '42s';
                const sat1 = document.createElement('div');
                sat1.className = 'satellite';
                sat1.style.transform = 'rotate(70deg) translateX(28vmin)';
                sat1.style.background = 'radial-gradient(circle at 30% 30%, #b8d0ff, #7f9fd0)';
                sat1.style.width = '26px';
                sat1.style.height = '26px';
                sat1.style.boxShadow = '0 0 50px #9ab3ff, 0 0 90px #6f8fdf';
                orbit1.appendChild(sat1);
                container.appendChild(orbit1);

                const orbit2 = document.createElement('div');
                orbit2.className = 'satellite-orbit';
                orbit2.style.animationDuration = '35s';
                const sat2 = document.createElement('div');
                sat2.className = 'satellite';
                sat2.style.transform = 'rotate(200deg) translateX(38vmin)';
                sat2.style.background = 'radial-gradient(circle at 30% 30%, #c0cfff, #8f9fcf)';
                sat2.style.width = '22px';
                sat2.style.height = '22px';
                sat2.style.boxShadow = '0 0 40px #9fb0ff, 0 0 70px #7f8fdf';
                const ring2 = document.createElement('div');
                ring2.style.position = 'absolute';
                ring2.style.top = '50%';
                ring2.style.left = '50%';
                ring2.style.width = '38px';
                ring2.style.height = '12px';
                ring2.style.background = 'rgba(110, 150, 240, 0.3)';
                ring2.style.borderRadius = '50%';
                ring2.style.transform = 'translate(-50%, -50%) rotate(25deg)';
                ring2.style.filter = 'blur(4px)';
                ring2.style.boxShadow = '0 0 30px #9fb0ff';
                sat2.appendChild(ring2);
                orbit2.appendChild(sat2);
                container.appendChild(orbit2);

                const ringBig = document.createElement('div');
                ringBig.className = 'ring';
                ringBig.style.border = '4px dotted rgba(80, 140, 230, 0.2)';
                ringBig.style.boxShadow = '0 0 70px rgba(60, 120, 220, 0.25), inset 0 0 60px rgba(60, 120, 220, 0.1)';
                container.appendChild(ringBig);

                const ringSmall = document.createElement('div');
                ringSmall.className = 'ring ring-small';
                ringSmall.style.border = '3px dotted rgba(100, 160, 240, 0.25)';
                ringSmall.style.boxShadow = '0 0 60px rgba(80, 140, 230, 0.3), inset 0 0 50px rgba(80, 140, 230, 0.15)';
                container.appendChild(ringSmall);

                for (let i = 0; i < 8; i++) {
                    const extraRing = document.createElement('div');
                    extraRing.className = 'extra-ring';
                    const size = 20 + i * 6; 
                    extraRing.style.width = size + 'vmin';
                    extraRing.style.height = size + 'vmin';
                    extraRing.style.border = `1px dotted rgba(90, 150, 240, ${0.05 + i*0.01})`; 
                    extraRing.style.boxShadow = `0 0 ${20 + i*5}px rgba(70, 130, 230, 0.1), inset 0 0 ${15 + i*3}px rgba(70, 130, 230, 0.06)`;
                    extraRing.style.animation = `ringPulse ${14 + i*2}s infinite alternate`;
                    extraRing.style.animationDelay = `${i * 0.5}s`;
                    container.appendChild(extraRing);
                }
            }

            createOrbitalElements();

            function createMeteors() {
                const container = document.getElementById('meteorContainer');
                if (!container) return;
                const meteorCount = 20;
                for (let i = 0; i < meteorCount; i++) {
                    const meteor = document.createElement('div');
                    meteor.className = 'meteor';
                    meteor.style.left = Math.random() * 30 + '%';
                    meteor.style.top = Math.random() * 30 + '%';
                    const width = 120 + Math.random() * 150;
                    meteor.style.width = width + 'px';
                    meteor.style.opacity = Math.random() * 0.3 + 0.1;
                    const duration = 8 + Math.random() * 12;
                    const delay = Math.random() * 20;
                    meteor.style.animationDuration = duration + 's';
                    meteor.style.animationDelay = delay + 's';
                    const angle = 30 + Math.random() * 15;
                    meteor.style.transform = `rotate(${angle}deg)`;
                    const hueShift = 200 + Math.random() * 30;
                    meteor.style.background = `linear-gradient(90deg, hsla(${hueShift}, 80%, 70%, 0.6) 0%, hsla(${hueShift}, 70%, 60%, 0.2) 60%, transparent 100%)`;
                    meteor.style.boxShadow = `0 0 40px hsl(${hueShift}, 80%, 70%), 0 0 80px hsl(${hueShift}, 70%, 60%)`;
                    
                    container.appendChild(meteor);
                }
            }
            createMeteors();

            function applyStarryBackgroundToKeys() {
                const keys = document.querySelectorAll('.white-key, .black-key');
                keys.forEach(key => {
                    const starCount = Math.floor(Math.random() * 15) + 25;
                    let stars = '';
                    for (let i = 0; i < starCount; i++) {
                        const posX = Math.random() * 100;
                        const posY = Math.random() * 100;
                        const size = Math.random() * 3 + 1;
                        const colorIntensity = Math.random() * 0.6 + 0.4;
                        const color = `rgba(255, ${Math.floor(200 + Math.random()*55)}, 255, ${colorIntensity})`;
                        stars += `radial-gradient(${size}px ${size}px at ${posX}% ${posY}%, ${color} 0%, transparent ${size+1}px), `;
                    }
                    for (let j = 0; j < 2; j++) {
                        const blurX = Math.random() * 40 + 20;
                        const blurY = Math.random() * 40 + 20;
                        const posX = Math.random() * 100;
                        const posY = Math.random() * 100;
                        const hue = Math.random() * 40 + 240;
                        stars += `radial-gradient(${blurX}px ${blurY}px at ${posX}% ${posY}%, hsla(${hue}, 70%, 60%, 0.15) 0%, transparent 70%), `;
                    }
                    stars += `transparent`; 
                    
                    key.style.background = stars;
                    if (key.classList.contains('black-key')) {
                        key.style.filter = 'brightness(0.8) contrast(1.2)';
                    } else {
                        key.style.filter = 'brightness(1.1) contrast(1.1)';
                    }
                });
            }

            const playlist = [
                { name: "Terrasphere", src: "piano-songs/飞侠Shrimp - Terrasphere 钢琴版.mp3" },
                { name: "Moonlight Sonata", src: "piano-songs/beethoven - moonlight sonata.mp3" },
                { name: "Twinkle Twinkle Little Star", src: "piano-songs/mozart - twinkle twinkle little star.mp3" }
            ];

            let currentTrackIndex = 0;
            const audio = document.getElementById('bgMusic');
            const playBtn = document.getElementById('playPauseBtn');
            const playIcon = document.getElementById('playIcon');
            const trackNameSpan = document.getElementById('currentTrackName');
            const volumeControl = document.getElementById('volumeControl');

            function loadTrack(index) {
                if (playlist.length === 0) return;
                const track = playlist[index % playlist.length];
                audio.src = track.src;
                trackNameSpan.textContent = track.name;
                audio.load();
            }

            if (playlist.length > 0) loadTrack(0);

            function togglePlay() {
                if (audio.paused) {
                    audio.play().then(() => {
                        playIcon.className = 'fas fa-pause';
                    }).catch(e => {
                        alert('无法播放音频，请检查文件路径。\n\n' + e.message);
                    });
                } else {
                    audio.pause();
                    playIcon.className = 'fas fa-play';
                }
            }

            playBtn.addEventListener('click', togglePlay);

            audio.addEventListener('ended', () => {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
                loadTrack(currentTrackIndex);
                audio.play().catch(() => {});
                playIcon.className = 'fas fa-pause';
            });

            volumeControl.addEventListener('input', (e) => {
                audio.volume = e.target.value;
            });

            const keys = document.querySelectorAll('.white-key, .black-key');
            
            function playKeyNote(key) {
                key.classList.add('active');
                setTimeout(() => {
                    key.classList.remove('active');
                }, 200);
                
                if (!audio.paused) {
                    const waveBar = document.querySelector('.wave-bar');
                    waveBar.style.animation = 'none';
                    setTimeout(() => {
                        waveBar.style.animation = 'wavePulse 0.5s ease-in-out';
                    }, 10);
                }
            }

            keys.forEach(key => {
                key.addEventListener('click', function() {
                    playKeyNote(this);
                    if (audio.paused) togglePlay();
                });
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    togglePlay();
                }
                
                const keyMap = {
                    KeyA: document.querySelector('[data-note="c4"]'),
                    KeyW: document.querySelector('[data-note="c#4"]'),
                    KeyS: document.querySelector('[data-note="d4"]'),
                    KeyE: document.querySelector('[data-note="d#4"]'),
                    KeyD: document.querySelector('[data-note="e4"]'),
                    KeyF: document.querySelector('[data-note="f4"]'),
                    KeyT: document.querySelector('[data-note="f#4"]'),
                    KeyG: document.querySelector('[data-note="g4"]'),
                    KeyY: document.querySelector('[data-note="g#4"]'),
                    KeyH: document.querySelector('[data-note="a4"]'),
                    KeyU: document.querySelector('[data-note="a#4"]'),
                    KeyJ: document.querySelector('[data-note="b4"]'),
                    KeyK: document.querySelector('[data-note="c5"]'),
                    KeyO: document.querySelector('[data-note="c#5"]'),
                    KeyL: document.querySelector('[data-note="d5"]')
                };
                
                if (keyMap[e.code]) {
                    e.preventDefault();
                    playKeyNote(keyMap[e.code]);
                    if (audio.paused) togglePlay();
                }
            });
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes wavePulse {
                    0% { transform: scale(1); }
                    50% { transform: scale(1.05); }
                    100% { transform: scale(1); }
                }
            `;
            document.head.appendChild(style);

            window.addEventListener('load', function() {
                applyStarryBackgroundToKeys();
            });
        })();
    </script>

    <script>
        (function() {
            const canvas = document.getElementById('auroraCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let time = 0;

            const virgoStars = [
                { x: 0.78, y: 0.15, size: 2.2 },
                { x: 0.85, y: 0.22, size: 1.5 },
                { x: 0.72, y: 0.25, size: 1.8 },
                { x: 0.90, y: 0.30, size: 1.4 },
                { x: 0.82, y: 0.32, size: 1.6 },
                { x: 0.76, y: 0.34, size: 1.3 },
                { x: 0.88, y: 0.12, size: 1.7 },
                { x: 0.93, y: 0.18, size: 1.2 }
            ];
            const connections = [
                [0,1], [1,3], [0,2], [2,4], [4,6], [3,5], [5,7], [2,5], [4,7]
            ];

            let stars = [];
            const STAR_COUNT = 800;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                generateStars();
            }

            function generateStars() {
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random(),
                        y: Math.random(),
                        radius: Math.random() * 2.5 + 0.5,
                        brightness: Math.random() * 0.8 + 0.2,
                        twinkleSpeed: Math.random() * 0.02 + 0.005,
                        twinklePhase: Math.random() * Math.PI * 2,
                        color: `hsl(${200 + Math.random() * 60}, 70%, ${70 + Math.random() * 30}%)`
                    });
                }
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function drawAuroraAndStars() {
                ctx.clearRect(0, 0, width, height);

                for (let s of stars) {
                    const twinkle = 0.6 + 0.4 * Math.sin(time * s.twinkleSpeed * 10 + s.twinklePhase);
                    const alpha = s.brightness * twinkle * 0.9;
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(s.x * width, s.y * height, s.radius * (0.9 + 0.2 * Math.sin(time * 2 + s.x*10)), 0, Math.PI*2);
                    ctx.fillStyle = s.color;
                    ctx.fill();
                    if (s.radius > 1.8) {
                        ctx.shadowColor = s.color;
                        ctx.shadowBlur = 15;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }

                ctx.save();
                ctx.filter = 'blur(25px)';
                ctx.globalAlpha = 0.35;
                
                ctx.beginPath();
                for (let x = 0; x < width; x += 30) {
                    const y = height * 0.6 + Math.sin(x * 0.003 + time * 0.8) * 70 + Math.cos(x * 0.005 + time * 1.2) * 50;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();
                const grad1 = ctx.createLinearGradient(0, 0, width*0.5, 0);
                grad1.addColorStop(0, 'rgba(60, 210, 230, 0.2)');
                grad1.addColorStop(0.6, 'rgba(110, 90, 250, 0.35)');
                grad1.addColorStop(1, 'rgba(180, 80, 240, 0.2)');
                ctx.fillStyle = grad1;
                ctx.fill();

                ctx.beginPath();
                for (let x = 0; x < width; x += 30) {
                    const y = height * 0.2 + Math.sin(x * 0.004 + time * 1.5) * 80 + Math.cos(x * 0.006 + time * 0.9) * 60;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.lineTo(width, 0);
                ctx.lineTo(0, 0);
                ctx.closePath();
                const grad2 = ctx.createLinearGradient(0, 0, width*0.7, 0);
                grad2.addColorStop(0, 'rgba(150, 70, 230, 0.25)');
                grad2.addColorStop(0.5, 'rgba(90, 130, 250, 0.3)');
                grad2.addColorStop(1, 'rgba(40, 190, 220, 0.15)');
                ctx.fillStyle = grad2;
                ctx.fill();

                ctx.beginPath();
                for (let x = 0; x < width; x += 30) {
                    const y = height * 0.4 + Math.sin(x * 0.002 + time * 2.2) * 100 + Math.cos(x * 0.003 + time * 1.8) * 40;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();
                const grad3 = ctx.createLinearGradient(0, 0, width, 0);
                grad3.addColorStop(0, 'rgba(50, 220, 200, 0.15)');
                grad3.addColorStop(0.4, 'rgba(130, 140, 255, 0.3)');
                grad3.addColorStop(0.8, 'rgba(200, 90, 240, 0.2)');
                ctx.fillStyle = grad3;
                ctx.fill();

                ctx.restore();

                ctx.save();
                ctx.shadowColor = '#9fc';
                ctx.shadowBlur = 25;
                ctx.strokeStyle = 'rgba(190, 220, 255, 0.5)';
                ctx.lineWidth = 2;
                connections.forEach(pair => {
                    const a = virgoStars[pair[0]];
                    const b = virgoStars[pair[1]];
                    ctx.beginPath();
                    ctx.moveTo(a.x * width, a.y * height);
                    ctx.lineTo(b.x * width, b.y * height);
                    ctx.strokeStyle = 'rgba(140, 190, 255, 0.4)';
                    ctx.stroke();
                });

                virgoStars.forEach(star => {
                    const twinkle = 0.7 + 0.3 * Math.sin(time * 4 + star.x * 20);
                    ctx.shadowBlur = 30 * twinkle;
                    ctx.beginPath();
                    ctx.arc(star.x * width, star.y * height, star.size * 2.0 * (0.8 + 0.2 * Math.sin(time*3+star.x*10)), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255, 250, 210, ${0.9 * twinkle})`;
                    ctx.fill();
                    ctx.shadowBlur = 45;
                    ctx.fillStyle = '#fffef0';
                    ctx.arc(star.x * width, star.y * height, star.size * 1.1, 0, Math.PI*2);
                    ctx.fill();
                });
                ctx.restore();

                time += 0.02;
                requestAnimationFrame(drawAuroraAndStars);
            }
            drawAuroraAndStars();
        })();
    </script>
</body>
</html>
